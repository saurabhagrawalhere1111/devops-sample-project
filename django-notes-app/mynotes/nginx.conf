# Frontend nginx: serve the React SPA and proxy backend routes.
# The backend hostname comes from DNS:
#   - docker-compose: service name "backend"
#   - Kubernetes:     service "notes-backend" (same namespace)
# Override by setting BACKEND_HOST at build/deploy time if needed.

upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # nginx's own liveness for the container healthcheck.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # SPA: serve static assets, fall back to index.html for client routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API + Django admin + Prometheus metrics to the backend.
    location ~ ^/(api|admin|metrics|livez|readyz|static/admin) {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
