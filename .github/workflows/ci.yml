name: CI

on:
  push:
    branches: [main]
    paths: ["django-notes-app/**", ".github/workflows/ci.yml"]
  pull_request:
    branches: [main]
    paths: ["django-notes-app/**"]

# Keyless AWS auth + cosign keyless signing both need an OIDC token.
permissions:
  contents: read
  id-token: write
  security-events: write   # upload SARIF to the Security tab
  packages: read

env:
  AWS_REGION: us-east-1
  APP_DIR: django-notes-app
  BACKEND_REPO: notesops/notes-backend
  FRONTEND_REPO: notesops/notes-frontend

jobs:
  # --------------------------------------------------------------------- test
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: django-notes-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: django-notes-app/requirements.txt
      - name: Install backend deps
        run: pip install -r requirements.txt
      - name: Django checks + tests (sqlite)
        env:
          DB_ENGINE: sqlite
          DJANGO_DEBUG: "true"
          DJANGO_SECRET_KEY: ci-test-key
        run: |
          python manage.py check
          python manage.py test --noinput

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: django-notes-app/mynotes/package-lock.json
      - name: Build + test frontend
        working-directory: django-notes-app/mynotes
        run: |
          npm ci
          CI=true npm test -- --watchAll=false --passWithNoTests
          npm run build

  # ----------------------------------------------------------------- security
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Secret scanning
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

      # Dependency + IaC + filesystem vuln scan (SARIF -> Security tab)
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif

      # IaC misconfiguration scan of the Terraform
      - name: Checkov (Terraform)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/terraform
          framework: terraform
          soft_fail: true   # report but don't block while you remediate findings

  # --------------------------------------------------------------------- SAST
  codeql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python, javascript
      - uses: github/codeql-action/analyze@v3

  # ----------------------------------------------------- build, scan, sign, push
  build-push:
    # Only publish from main; PRs run test/security/codeql only.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [test, security, codeql]
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Image tag from commit SHA
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Install syft (SBOM)
        uses: anchore/sbom-action/download-syft@v0

      - name: Build & push backend
        id: backend
        uses: docker/build-push-action@v6
        with:
          context: django-notes-app
          file: django-notes-app/Dockerfile
          push: true
          tags: ${{ steps.ecr.outputs.registry }}/${{ env.BACKEND_REPO }}:${{ steps.meta.outputs.tag }}
          provenance: true
          sbom: true

      - name: Build & push frontend
        id: frontend
        uses: docker/build-push-action@v6
        with:
          context: django-notes-app/mynotes
          file: django-notes-app/mynotes/Dockerfile
          push: true
          tags: ${{ steps.ecr.outputs.registry }}/${{ env.FRONTEND_REPO }}:${{ steps.meta.outputs.tag }}
          provenance: true
          sbom: true

      # Scan the built images for vulns before we trust them.
      - name: Trivy scan backend image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ steps.ecr.outputs.registry }}/${{ env.BACKEND_REPO }}:${{ steps.meta.outputs.tag }}
          severity: CRITICAL,HIGH
          exit-code: "0"   # set to "1" to fail the build on findings

      # Generate + attach an SBOM, then keyless-sign both images with cosign.
      - name: SBOM + sign backend
        env:
          IMG: ${{ steps.ecr.outputs.registry }}/${{ env.BACKEND_REPO }}:${{ steps.meta.outputs.tag }}
        run: |
          syft "$IMG" -o spdx-json > backend.sbom.json
          cosign attest --yes --predicate backend.sbom.json --type spdxjson "$IMG"
          cosign sign --yes "$IMG"
      - name: SBOM + sign frontend
        env:
          IMG: ${{ steps.ecr.outputs.registry }}/${{ env.FRONTEND_REPO }}:${{ steps.meta.outputs.tag }}
        run: |
          syft "$IMG" -o spdx-json > frontend.sbom.json
          cosign attest --yes --predicate frontend.sbom.json --type spdxjson "$IMG"
          cosign sign --yes "$IMG"

  # ----------------------------------------------- GitOps: bump the image tag
  promote:
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: write   # commit the image-tag bump back to the repo
    steps:
      - uses: actions/checkout@v4
      - name: Bump image tag in Helm values (triggers Argo CD sync)
        env:
          TAG: ${{ needs.build-push.outputs.image_tag }}
        run: |
          sudo apt-get update && sudo apt-get install -y yq
          F=gitops/apps/notesapp/values.yaml
          yq -i ".backend.image.tag = \"$TAG\"" "$F"
          yq -i ".frontend.image.tag = \"$TAG\"" "$F"
      - name: Commit the promotion
        run: |
          git config user.name  "ci-bot"
          git config user.email "ci-bot@users.noreply.github.com"
          git add gitops/apps/notesapp/values.yaml
          git commit -m "chore(deploy): promote ${{ needs.build-push.outputs.image_tag }} [skip ci]" || echo "no changes"
          git push
