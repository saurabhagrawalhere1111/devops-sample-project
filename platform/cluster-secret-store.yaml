# Tells External Secrets how to reach AWS Secrets Manager.
# Auth is via IRSA on the external-secrets ServiceAccount (no static keys).
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
