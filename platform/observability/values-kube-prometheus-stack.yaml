# kube-prometheus-stack values: Prometheus + Grafana + Alertmanager.
# Covers Phase 6 (metrics/dashboards) and Phase 7 (alerting routes + rules).

prometheus:
  prometheusSpec:
    retention: 7d
    # Discover ServiceMonitors across all namespaces, not just labeled-by-helm ones.
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    resources:
      requests: { cpu: 200m, memory: 512Mi }

grafana:
  adminPassword: "" # leave empty -> autogenerated secret (printed by install.sh)
  defaultDashboardsEnabled: true
  # Wire Loki (logs) and Tempo (traces) as datasources alongside Prometheus.
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.monitoring.svc:3100
      access: proxy
    - name: Tempo
      type: tempo
      url: http://tempo.monitoring.svc:3100
      access: proxy

# ---------------------------------------------------------------- Alerting
alertmanager:
  config:
    route:
      receiver: slack-default
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        # Critical alerts also fan out to the AI triage agent + PagerDuty.
        - matchers: ['severity="critical"']
          receiver: ai-and-pager
          continue: true
    receivers:
      - name: slack-default
        slack_configs:
          - api_url: ${SLACK_WEBHOOK_URL}   # set via a K8s secret / env substitution
            channel: "#alerts"
            title: '{{ .CommonLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.description }}{{ "\n" }}{{ end }}'
      - name: ai-and-pager
        # The AI triage agent (Phase 9) listens here and posts a root-cause summary.
        webhook_configs:
          - url: http://ai-agent.aiops.svc:8080/alert
            send_resolved: true
        pagerduty_configs:
          - routing_key: ${PAGERDUTY_ROUTING_KEY}

# --------------------------------------------------- Custom app/SLO alert rules
additionalPrometheusRulesMap:
  notesapp-rules:
    groups:
      - name: notesapp.slo
        rules:
          - alert: NotesBackendHighErrorRate
            expr: |
              sum(rate(django_http_responses_total_by_status_total{status=~"5.."}[5m]))
                / sum(rate(django_http_requests_total_by_view_transport_method_total[5m])) > 0.05
            for: 5m
            labels: { severity: critical }
            annotations:
              description: "Backend 5xx error rate >5% for 5m (SLO burn)."
          - alert: NotesBackendHighLatencyP99
            expr: histogram_quantile(0.99, sum(rate(django_http_requests_latency_seconds_by_view_method_bucket[5m])) by (le)) > 1
            for: 10m
            labels: { severity: warning }
            annotations:
              description: "Backend p99 latency >1s for 10m."
          - alert: PodCrashLooping
            expr: increase(kube_pod_container_status_restarts_total{namespace="notesapp"}[15m]) > 3
            for: 5m
            labels: { severity: critical }
            annotations:
              description: "Pod {{ $labels.pod }} is crash-looping."
