apiVersion: apps/v1
kind: Deployment
metadata:
  name: notes-backend
  namespace: {{ .Values.namespace }}
  labels: { app: notes-backend }
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels: { app: notes-backend }
  template:
    metadata:
      labels: { app: notes-backend }
    spec:
      securityContext:
        runAsNonRoot: true
        # The image's USER is the named system user "app" (uid 100). With only
        # runAsNonRoot set, the kubelet can't verify a *named* user is non-root
        # and fails with CreateContainerConfigError. Pin the numeric uid/gid.
        runAsUser: 100
        runAsGroup: 101
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          ports:
            - containerPort: 8000
          # All runtime config/secrets come from the synced K8s Secret.
          envFrom:
            - secretRef:
                name: notesapp-secret
          env:
            - name: DJANGO_DEBUG
              value: "false"
            - name: DJANGO_ALLOWED_HOSTS
              value: "{{ .Values.ingress.host }},localhost,127.0.0.1"
          livenessProbe:
            # Probes hit the pod IP, so Django sees Host: <pod-ip> and rejects it
            # with DisallowedHost unless we send an allowed Host header.
            httpGet:
              path: /livez
              port: 8000
              httpHeaders:
                - { name: Host, value: localhost }
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
              httpHeaders:
                - { name: Host, value: localhost }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources: {{- toYaml .Values.backend.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities: { drop: ["ALL"] }
---
apiVersion: v1
kind: Service
metadata:
  name: notes-backend
  namespace: {{ .Values.namespace }}
  labels: { app: notes-backend }
spec:
  selector: { app: notes-backend }
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
# Alias service so the frontend's baked nginx upstream "backend:8000" resolves
# in-cluster. The image hardcodes host "backend" (see
# django-notes-app/mynotes/nginx.conf), but the real Service is "notes-backend".
# This avoids a frontend image rebuild. Remove once nginx points at notes-backend.
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: {{ .Values.namespace }}
  labels: { app: notes-backend }
spec:
  selector: { app: notes-backend }
  ports:
    - name: http
      port: 8000
      targetPort: 8000
