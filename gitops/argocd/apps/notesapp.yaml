apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: notesapp
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/saurabhagrawalhere1111/devops-sample-project.git
    targetRevision: main
    path: gitops/apps/notesapp        # the Helm chart
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: notesapp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
