apiVersion: apps/v1
kind: Deployment
metadata:
  name: notes-frontend
  namespace: {{ .Values.namespace }}
  labels: { app: notes-frontend }
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels: { app: notes-frontend }
  template:
    metadata:
      labels: { app: notes-frontend }
    spec:
      securityContext:
        runAsNonRoot: false   # nginx:alpine listens on 80 as root by default
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet: { path: /healthz, port: 80 }
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /healthz, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {{- toYaml .Values.frontend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: notes-frontend
  namespace: {{ .Values.namespace }}
  labels: { app: notes-frontend }
spec:
  selector: { app: notes-frontend }
  ports:
    - name: http
      port: 80
      targetPort: 80
