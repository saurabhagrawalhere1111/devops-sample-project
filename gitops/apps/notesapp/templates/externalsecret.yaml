{{- if .Values.externalSecret.enabled }}
# Pulls the JSON secret from AWS Secrets Manager into a K8s Secret named
# "notesapp-secret". Each JSON key becomes an env var via envFrom in the backend.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: notesapp-secret
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef }}
    kind: ClusterSecretStore
  target:
    name: notesapp-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ .Values.externalSecret.remoteKey }}
{{- end }}
